<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="appHeader">
        <div class="brandMark" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="brandCopy">
          <h1>Echo</h1>
          <p id="desktopName">Desktop</p>
        </div>
        <div id="connectionBadge" class="statusBadge loading" role="status">
          <span class="statusDot"></span>
          <span id="connectionLabel">连接中</span>
        </div>
      </header>

      <section id="loadingView" class="loadingView" aria-label="正在载入">
        <div class="skeleton heroSkeleton"></div>
        <div class="skeleton lineSkeleton"></div>
        <div class="skeleton actionSkeleton"></div>
      </section>

      <section id="mainView" class="mainView" hidden>
        <section class="pairingSection" aria-labelledby="pairingTitle">
          <div class="sectionHeading">
            <div>
              <h2 id="pairingTitle">手机配对</h2>
              <p id="pairingHint">用手机扫描二维码</p>
            </div>
            <button class="iconButton" type="button" id="refreshPairingQr" title="刷新二维码" aria-label="刷新二维码">
              <span aria-hidden="true">↻</span>
            </button>
          </div>

          <div id="pairingQr" class="qrStage" aria-live="polite">
            <div class="qrLoading"><span></span><span></span><span></span></div>
          </div>

          <button class="primaryButton" type="button" id="copyPairingUrl">复制配对链接</button>
        </section>

        <section class="quickStatus" aria-label="桌面状态">
          <div class="statusRow">
            <span class="rowLabel">Relay</span>
            <strong id="relayStatus">检查中</strong>
          </div>
          <div class="statusRow">
            <span class="rowLabel">Agent</span>
            <strong id="agentStatus">检查中</strong>
          </div>
          <div class="statusRow">
            <span class="rowLabel">能力</span>
            <strong id="capabilityStatus">检查中</strong>
          </div>
        </section>

        <div class="actionBar">
          <button type="button" id="restartAgent">重启</button>
          <button type="button" id="networkTest">诊断</button>
          <button type="button" id="desktopUpdate">更新</button>
        </div>

        <button class="detailsToggle" type="button" id="detailsToggle" aria-expanded="false" aria-controls="detailsPanel">
          <span>连接详情</span>
          <span class="chevron" aria-hidden="true">⌄</span>
        </button>

        <section id="detailsPanel" class="detailsPanel" hidden>
          <dl id="detailsList" class="detailsList"></dl>
          <p id="envPath" class="envPath"></p>
        </section>
      </section>

      <section id="setupView" class="setupView" hidden>
        <div class="setupHeading">
          <span class="setupStep">首次连接</span>
          <h2>连接到 Echo Relay</h2>
        </div>

        <form id="settingsForm" class="setupForm">
          <input class="srOnly" data-username-proxy type="text" autocomplete="username" tabindex="-1" aria-hidden="true" />
          <label>
            <span>Relay URL</span>
            <input data-key="ECHO_RELAY_URL" type="url" autocomplete="url" placeholder="https://echo.example.com" required />
          </label>
          <label>
            <span>手机配对 Token</span>
            <input data-key="ECHO_TOKEN" data-secret="true" type="password" autocomplete="new-password" placeholder="ept_..." required />
          </label>
          <label>
            <span>Desktop Agent Token</span>
            <input data-key="ECHO_AGENT_TOKEN" data-secret="true" type="password" autocomplete="new-password" placeholder="eat_..." />
          </label>
          <div class="fieldGrid">
            <label>
              <span>Agent ID</span>
              <input data-key="ECHO_AGENT_ID" autocomplete="off" placeholder="my-mac" required />
            </label>
            <label>
              <span>显示名称</span>
              <input data-key="ECHO_AGENT_DISPLAY_NAME" autocomplete="off" placeholder="My Mac" />
            </label>
          </div>
          <label>
            <span>Owner</span>
            <input data-key="ECHO_AGENT_OWNER_USERNAME" autocomplete="username" placeholder="owner" />
          </label>
          <details class="networkDetails">
            <summary>网络代理</summary>
            <label>
              <span>Proxy</span>
              <input data-key="ECHO_PROXY_URL" list="proxyOptions" autocomplete="off" placeholder="system" />
              <datalist id="proxyOptions">
                <option value="system"></option>
                <option value="http://127.0.0.1:7897"></option>
              </datalist>
            </label>
          </details>
          <button class="primaryButton" type="submit">保存并连接</button>
        </form>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
